version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: modern-router-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345678
      POSTGRES_DB: modern_router_mgmt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: modern-router-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_ENGINE: postgres
      DATABASE_URL: postgresql://postgres:12345678@postgres:5432/modern_router_mgmt
      ROUTER_CREDENTIALS_KEY: ${ROUTER_CREDENTIALS_KEY:-}
    ports:
      - "3000:3000"  # TanStack Start frontend
      - "3001:3001"  # API
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
