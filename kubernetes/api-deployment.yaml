# Modern Router Management API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: modern-router-api
  namespace: modern-router-mgmt
  labels:
    app: modern-router-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: modern-router-api
  template:
    metadata:
      labels:
        app: modern-router-api
    spec:
      containers:
        - name: api
          image: ghcr.io/rootdavinalfa/modern-router-management:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3001
            - name: frontend
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: DB_ENGINE
              value: "postgres"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: connection-string
            - name: ROUTER_CREDENTIALS_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: credentials-key
          resources:
            requests:
              memory: 512Mi
              cpu: 200m
            limits:
              memory: 1Gi
              cpu: 1000m
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      securityContext:
        fsGroup: 1000
---
# API Service
apiVersion: v1
kind: Service
metadata:
  name: modern-router-api
  namespace: modern-router-mgmt
  labels:
    app: modern-router-api
spec:
  ports:
    - port: 3001
      targetPort: http
      name: api
    - port: 3000
      targetPort: frontend
      name: frontend
  selector:
    app: modern-router-api
  type: ClusterIP
