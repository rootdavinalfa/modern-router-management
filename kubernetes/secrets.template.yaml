# Kubernetes Secrets Template
# IMPORTANT: Replace placeholder values with actual secrets before applying
# DO NOT commit actual secrets to version control

apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: modern-router-mgmt
type: Opaque
stringData:
  username: postgres
  password: CHANGE_ME_STRONG_PASSWORD
  database: modern_router_mgmt
  connection-string: postgresql://postgres:CHANGE_ME_STRONG_PASSWORD@postgresql:5432/modern_router_mgmt
---
apiVersion: v1
kind: Secret
metadata:
  name: api-secret
  namespace: modern-router-mgmt
type: Opaque
stringData:
  # Generate with: openssl rand -base64 32
  credentials-key: CHANGE_ME_ENCRYPTION_KEY_BASE64
